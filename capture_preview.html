<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capture Preview</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      color: #333;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
    }
    #captureImage {
      display: block;
      max-width: 100%;
      height: auto;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fafafa;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    button, a {
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 6px;
      border: 0;
      cursor: pointer;
      text-decoration: none;
      background: #3498db;
      color: #fff;
    }
    button.secondary {
      background: #6c757d;
    }
    a.secondary {
      background: #6c757d;
    }
    #status {
      margin: 8px 0 0 0;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Capture Preview</h1>
    <div id="status">Loading capture...</div>
    <img id="captureImage" alt="Captured area" style="display:none;" />
    <div class="row">
      <button id="closeBtn" class="secondary" type="button">Close</button>
      <a id="openRawLink" class="secondary" href="#" target="_blank" rel="noreferrer" style="display:none;">Open raw image</a>
    </div>
  </div>

  <script src="capture_preview.js"></script>
</body>
</html>
